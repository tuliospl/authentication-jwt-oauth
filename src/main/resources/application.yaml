spring:
  application:
    name: jwt-oauth

  datasource.username: root
  datasource.password: root
  datasource.url: jdbc:h2:file:./auth_db

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
